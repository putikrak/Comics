spring.application.name=pedidos-service
server.port=8082

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/pedidosDB?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=tu_password
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# URLs de los otros microservicios
microservicio.carrito.url=http://localhost:8081
microservicio.envios.url=http://localhost:8083

