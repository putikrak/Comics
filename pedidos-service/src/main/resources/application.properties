spring.application.name=pedidos-service
server.port=8082

# H2 para desarrollo local
spring.datasource.url=jdbc:h2:mem:pedidosdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# URLs de los otros microservicios
microservicio.carrito.url=http://localhost:8081
microservicio.envios.url=http://localhost:8083

